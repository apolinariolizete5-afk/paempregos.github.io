<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da Oportunidade | PA VAGAS MZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body { background:#f5f7fb; color:#222; display: flex; flex-direction: column; min-height: 100vh; }
        .container { max-width:900px; margin:30px auto; padding:0 20px; flex: 1; }
        
        /* Estilos dos Cards de Vagas */
        .grid-ultimas-vagas { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-top: 20px; }
        .card-vaga { background: #fff; border-radius: 12px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid #f0f0f0; }
        .img-miniatura-vaga { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; background: #eee; }
        .badge-nova { background: #e74c3c; color: white; padding: 4px 10px; border-radius: 20px; font-size: 11px; float: right; }
        .btn-ver-vaga { display: block; text-align: center; background: #0b5ed7; color: #fff; padding: 10px; border-radius: 8px; margin-top: 10px; text-decoration: none; }
        
        /* Layout Geral */
        header { background:#0b5ed7; padding:20px; color:#fff; display:flex; align-items:center; }
        .loading-container { text-align: center; padding: 50px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #0b5ed7; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header><h2>PA VAGAS MZ</h2></header>

<div class="container">
    <div id="conteudoVaga">
        <div class="loading-container"><div class="spinner"></div><p>A carregar...</p></div>
    </div>
    
    <div id="ultimasVagasContainer">
        <!-- As vagas recentes aparecerão aqui -->
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAMI9bD8EhVVS8Xp9rlvhPWg4hS3PBUH2A",
        authDomain: "empregosportal.firebaseapp.com",
        projectId: "empregosportal",
        storageBucket: "empregosportal.firebasestorage.app",
        messagingSenderId: "898227669228",
        appId: "1:898227669228:web:9c12c501bd2e9c73e1bdc9"
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const urlParams = new URLSearchParams(window.location.search);
    const vagaId = urlParams.get('id');

    async function carregarTudo() {
        // 1. Carregar Detalhes da Vaga Atual
        if (vagaId) {
            const doc = await db.collection("vagas").doc(vagaId).get();
            if (doc.exists) {
                const v = doc.data();
                document.getElementById('conteudoVaga').innerHTML = `
                    <h1>${v.titulo}</h1>
                    <img src="${v.imagem}" style="width:100%; border-radius:10px;">
                    <p>${v.descricao}</p>
                `;
            }
        }

        // 2. Carregar as 6 Últimas Vagas (ORDEM CRONOLÓGICA)
        try {
            const snapshot = await db.collection("vagas")
                .orderBy("dataCriacao", "desc") // <--- O SEGREDO ESTÁ AQUI
                .limit(6)
                .get();

            let htmlUltimas = '<h3>Últimas Oportunidades</h3><div class="grid-ultimas-vagas">';
            
            snapshot.forEach(doc => {
                if(doc.id !== vagaId) {
                    const v = doc.data();
                    const img = v.imagem ? v.imagem : 'https://placehold.co/400x200?text=Sem+Imagem';
                    htmlUltimas += `
                        <div class="card-vaga">
                            <span class="badge-nova">Nova</span>
                            <img src="${img}" class="img-miniatura-vaga">
                            <h4>${v.titulo}</h4>
                            <p>${v.empresa}</p>
                            <a href="detalhes_vaga.html?id=${doc.id}" class="btn-ver-vaga">Ver Detalhes</a>
                        </div>
                    `;
                }
            });
            htmlUltimas += '</div>';
            document.getElementById('ultimasVagasContainer').innerHTML = htmlUltimas;
        } catch (e) {
            console.error("Erro ao carregar últimas vagas (Verifique o índice do Firebase):", e);
        }
    }

    carregarTudo();
</script>

</body>
</html>
