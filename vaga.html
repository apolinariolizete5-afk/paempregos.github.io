<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PA VAGAS MZ | Detalhes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body { background:#f5f7fb; color:#333; padding-bottom: 80px; }
        .header-top { background:#0b5ed7; color:white; padding:15px; text-align:center; font-weight:600; }
        .container { padding: 15px; }
        
        /* Grid das Últimas Vagas (2 por linha) */
        .grid-vagas {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        .card-vaga {
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        .card-vaga img { width: 100%; height: 80px; object-fit: cover; border-radius: 5px; margin-bottom: 5px; }
        .card-vaga h4 { font-size: 13px; margin: 5px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 35px;}
        .btn-card { display: block; background: #0b5ed7; color: white; padding: 6px; font-size: 11px; border-radius: 5px; margin-top: 5px; text-decoration: none; }

        /* Botões de Ação */
        .btn-acao { display: block; width: 100%; padding: 15px; border-radius: 8px; border: none; margin-bottom: 10px; font-weight: 600; cursor: pointer; text-align: center; color: white; text-decoration: none; }
        .btn-email { background: #0b5ed7; }
        .btn-partilhar { background: #6c757d; }
        .btn-wa { background: #25d366; }

        footer { margin-top: 30px; text-align: center; padding: 20px; border-top: 1px solid #ddd; font-size: 12px; color: #777; }
    </style>
</head>
<body>

<div class="header-top">PA VAGAS MZ</div>

<div class="container">
    <div id="detalhesVaga">
        <p>A carregar informações...</p>
    </div>

    <div id="zonaBotoes" style="display:none;">
        <a id="linkEmail" href="#" class="btn-acao btn-email"><i class="fas fa-envelope"></i> Enviar Currículo</a>
        <button class="btn-acao btn-partilhar" onclick="window.print()"><i class="fas fa-share-alt"></i> Partilhar Oportunidade</button>
        <a href="https://whatsapp.com/channel/0029VbDLGxu4SpkOM6UG7S3p" class="btn-acao btn-wa"><i class="fab fa-whatsapp"></i> Receba Vagas no WhatsApp</a>
    </div>

    <h3 style="margin-top:30px;">Últimas Oportunidades</h3>
    <div id="gridVagas" class="grid-vagas"></div>
</div>

<footer>
    <p>&copy; 2026 PA VAGAS MZ</p>
</footer>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAMI9bD8EhVVS8Xp9rlvhPWg4hS3PBUH2A",
        authDomain: "empregosportal.firebaseapp.com",
        projectId: "empregosportal",
        storageBucket: "empregosportal.firebasestorage.app",
        messagingSenderId: "898227669228",
        appId: "1:898227669228:web:9c12c501bd2e9c73e1bdc9"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const urlParams = new URLSearchParams(window.location.search);
    const vagaId = urlParams.get('id');

    async function carregarTudo() {
        // 1. Carregar Detalhe
        if (vagaId) {
            const doc = await db.collection("vagas").doc(vagaId).get();
            if (doc.exists) {
                const v = doc.data();
                document.getElementById('detalhesVaga').innerHTML = `<h2>${v.titulo}</h2><p style="margin:15px 0;">${v.descricao}</p>`;
                document.getElementById('linkEmail').href = `mailto:${v.email}`;
                document.getElementById('zonaBotoes').style.display = 'block';
            }
        }

        // 2. Carregar Grid 2x2
        const snapshot = await db.collection("vagas").orderBy("dataCriacao", "desc").limit(4).get();
        let gridHtml = '';
        snapshot.forEach(doc => {
            if(doc.id !== vagaId) {
                const v = doc.data();
                gridHtml += `
                    <div class="card-vaga">
                        <img src="${v.imagem || 'https://via.placeholder.com/150'}">
                        <h4>${v.titulo}</h4>
                        <a href="detalhes_vaga.html?id=${doc.id}" class="btn-card">Ver</a>
                    </div>
                `;
            }
        });
        document.getElementById('gridVagas').innerHTML = gridHtml;
    }
    carregarTudo();
</script>

</body>
</html>
