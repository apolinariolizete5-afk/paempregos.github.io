<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da Vaga | PA VAGAS MZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body { background:#f5f7fb; color:#222; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background:#0b5ed7; height:70px; display:flex; align-items:center; padding:0 20px; color:white; justify-content:space-between; position:sticky; top:0; z-index:99; }
        .menu-btn { font-size:24px; cursor:pointer; }

        /* Sidebar */
        .sidebar { position:fixed; left:-300px; top:0; width:280px; height:100%; background:white; z-index:1000; transition:0.3s; box-shadow:5px 0 15px rgba(0,0,0,0.1); padding:20px; }
        .sidebar.active { left:0; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999; }
        .overlay.active { display:block; }
        .sidebar a { display:block; padding:15px; color:#333; text-decoration:none; border-bottom:1px solid #eee; }

        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; flex: 1; }
        
        /* Grid Vagas */
        .grid-vagas { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 20px; }
        .card-vaga { background: white; padding: 10px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card-vaga h4 { font-size: 12px; height: 35px; overflow: hidden; margin-bottom: 5px; }
        .btn-ver { display: block; background: #0b5ed7; color: white; padding: 5px; border-radius: 5px; font-size: 11px; margin-top: 5px; }

        /* CTA WhatsApp */
        .cta-wa { background: #25d366; color: white; padding: 15px; border-radius: 8px; text-align: center; margin: 20px 0; font-weight: 600; text-decoration: none; display: block; }

        /* Footer */
        footer { background: #1a1a2e; color: white; padding: 20px; text-align: center; margin-top: 40px; }
        .footer-social { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; }
        .footer-social a { color: white; font-size: 20px; }
        .assinatura { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<div class="sidebar" id="sidebar">
    <h3 style="margin-bottom:20px;">Menu</h3>
    <a href="index.html">Página Inicial</a>
    <a href="enviar-vaga.html">Publicar Vaga</a>
    <a href="contacto.html">Contacto</a>
</div>

<header>
    <div class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    <div>PA VAGAS MZ</div>
    <div></div>
</header>

<div class="container">
    <div id="conteudoVaga">Carregando...</div>

    <a href="https://whatsapp.com/channel/0029VbDLGxu4SpkOM6UG7S3p" class="cta-wa">
        <i class="fab fa-whatsapp"></i> Receba novas vagas no seu WhatsApp
    </a>

    <h3>Últimas Oportunidades</h3>
    <div id="gridVagas" class="grid-vagas"></div>
</div>

<footer>
    <div class="footer-social">
        <a href="https://www.facebook.com/profile.php?id=61591198577276"><i class="fab fa-facebook"></i></a>
        <a href="https://whatsapp.com/channel/0029VbDLGxu4SpkOM6UG7S3p"><i class="fab fa-whatsapp"></i></a>
    </div>
    <p>&copy; 2026 PA VAGAS MZ</p>
    <div class="assinatura">Criado e Desenvolvido por Apolinário Lizete</div>
</footer>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAMI9bD8EhVVS8Xp9rlvhPWg4hS3PBUH2A",
        authDomain: "empregosportal.firebaseapp.com",
        projectId: "empregosportal",
        storageBucket: "empregosportal.firebasestorage.app",
        messagingSenderId: "898227669228",
        appId: "1:898227669228:web:9c12c501bd2e9c73e1bdc9"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }
    document.getElementById('overlay').onclick = toggleMenu;

    // Carregar Detalhes
    const urlParams = new URLSearchParams(window.location.search);
    const vagaId = urlParams.get('id');

    async function init() {
        if(vagaId) {
            const doc = await db.collection("vagas").doc(vagaId).get();
            if(doc.exists) {
                const v = doc.data();
                document.getElementById('conteudoVaga').innerHTML = `
                    <h2>${v.titulo}</h2>
                    <p><strong>Empresa:</strong> ${v.empresa}</p>
                    <p>${v.descricao}</p>
                `;
            }
        }

        // Carregar 6 últimas vagas
        const snapshot = await db.collection("vagas").orderBy("dataCriacao", "desc").limit(6).get();
        let html = '';
        snapshot.forEach(doc => {
            const v = doc.data();
            html += `
                <div class="card-vaga">
                    <h4>${v.titulo}</h4>
                    <a href="vaga.html?id=${doc.id}" class="btn-ver">Ver</a>
                </div>
            `;
        });
        document.getElementById('gridVagas').innerHTML = html;
    }
    init();
</script>

</body>
</html>
