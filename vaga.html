<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da Vaga | PA VAGAS MZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body { background:#f5f7fb; color:#222; display: flex; flex-direction: column; min-height: 100vh; }
        header { height:72px; background:#0b5ed7; display:flex; align-items:center; padding:0 18px; color:#fff; position:sticky; top:0; z-index:999; }
        .menu-btn { font-size:25px; cursor:pointer; margin-right:15px; }
        
        /* Sidebar */
        .sidebar { position:fixed; left:-300px; top:0; width:300px; height:100%; background:#fff; z-index:1000; transition:0.3s; box-shadow:4px 0 20px rgba(0,0,0,0.1); overflow-y:auto; }
        .sidebar.active { left:0; }
        .sidebar-top { background:#0b5ed7; padding:30px 20px; color:#fff; text-align:center; }
        .sidebar a { display:block; padding:18px 22px; border-bottom:1px solid #eee; color:#333; text-decoration:none; font-weight:500; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:998; }
        .overlay.active { display:block; }

        .container { max-width:900px; margin:30px auto; padding:0 20px; }
        .vaga-detalhe-card { background: #fff; border-radius: 18px; padding: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .vaga-main-img { width: 100%; max-height: 350px; object-fit: cover; border-radius: 12px; margin-bottom: 25px; }
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 30px 0; background: #f8f9fa; padding: 20px; border-radius: 12px; }
        
        .btn-candidatar { display: block; width: 100%; background: #0b5ed7; color: white; padding: 15px; border-radius: 10px; text-align: center; font-weight: 600; margin-top: 20px; text-decoration: none; }
        .btn-partilhar { display: block; width: 100%; background: #28a745; color: white; padding: 15px; border-radius: 10px; text-align: center; font-weight: 600; margin-top: 10px; cursor: pointer; border: none; font-size: 16px; }

        .banner-whatsapp { background: #25d366; color: white; padding: 20px; border-radius: 12px; text-align: center; margin: 30px 0; }
        .banner-whatsapp a { color: white; text-decoration: underline; font-weight: bold; }
        
        /* Grid 2 Colunas */
        .grid-outras { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card-mini { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; }
        .card-mini img { width: 100%; height: 80px; object-fit: cover; border-radius: 5px; }
        .card-mini h4 { font-size: 13px; margin: 10px 0; height: 30px; overflow: hidden; }
        .btn-ver { font-size: 12px; color: #0b5ed7; font-weight: bold; text-decoration: none; }

        footer { background: #1a1a2e; color: white; padding: 30px 20px; text-align: center; margin-top: 40px; }
        .footer-redes { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; font-size: 24px; }
        .assinatura { font-size: 9px; color: #888; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-top"><h2>PA VAGAS MZ</h2></div>
    <a href="index.html">Página Inicial</a>
    <a href="enviar-vaga.html">Enviar Vaga</a>
    <a href="contacto.html">Contacto</a>
    <a href="politica.html">Política de Privacidade</a>
    <a href="dmca.html">DMCA</a>
</div>

<header>
    <div class="menu-btn" onclick="document.getElementById('sidebar').classList.add('active'); document.getElementById('overlay').classList.add('active');"><i class="fas fa-bars"></i></div>
    <div>PA VAGAS MZ</div>
</header>

<div class="container">
    <div id="conteudoVaga" class="vaga-detalhe-card">Carregando detalhes...</div>
    
    <div class="banner-whatsapp">
        <p><i class="fab fa-whatsapp"></i> Receba Novas Vagas no teu WhatsApp</p>
        <a href="https://whatsapp.com/channel/0029VbDLGxu4SpkOM6UG7S3p" target="_blank">Aceder ao Canal Oficial</a>
    </div>

    <h3 style="margin-top:30px;">Outras Oportunidades</h3>
    <div id="listaSugestoes" class="grid-outras"></div>
</div>

<footer>
    <div class="footer-redes">
        <a href="https://www.facebook.com/profile.php?id=61591198577276" style="color:#1877f2;"><i class="fab fa-facebook"></i></a>
        <a href="https://whatsapp.com/channel/0029VbDLGxu4SpkOM6UG7S3p" style="color:#25d366;"><i class="fab fa-whatsapp"></i></a>
    </div>
    <p>&copy; 2026 PA VAGAS MZ</p>
    <div class="assinatura">Criado e Desenvolvido por Apolinário Lizete</div>
</footer>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAMI9bD8EhVVS8Xp9rlvhPWg4hS3PBUH2A", authDomain: "empregosportal.firebaseapp.com", projectId: "empregosportal", storageBucket: "empregosportal.firebasestorage.app", messagingSenderId: "898227669228", appId: "1:898227669228:web:9c12c501bd2e9c73e1bdc9" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.getElementById('overlay').onclick = () => { document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); };

    const vagaId = new URLSearchParams(window.location.search).get('id');

    async function carregar() {
        if(vagaId) {
            const doc = await db.collection("vagas").doc(vagaId).get();
            if(doc.exists) {
                const v = doc.data();
                document.getElementById('conteudoVaga').innerHTML = `
                    ${v.imagem ? `<img src="${v.imagem}" class="vaga-main-img">` : ''}
                    <h1>${v.titulo}</h1>
                    <p><strong>Empresa:</strong> ${v.empresa}</p>
                    <div class="grid-info">
                        <div><small>Localização</small><br><strong>${v.provincia}</strong></div>
                        <div><small>Salário</small><br><strong>${v.salario || 'A combinar'}</strong></div>
                        <div><small>Válido até</small><br><strong>${v.prazo ? v.prazo.split('-').reverse().join('/') : 'Não informado'}</strong></div>
                    </div>
                    <p style="white-space:pre-line;">${v.descricao}</p>
                    <a href="mailto:${v.email}?subject=Candidatura: ${v.titulo}" class="btn-candidatar"><i class="fas fa-envelope"></i> Enviar Candidatura</a>
                    <button class="btn-partilhar" onclick="partilhar()"><i class="fas fa-share-alt"></i> Partilhar Vaga</button>
                `;
            }
        }
        
        // Carrega até 6 vagas
        const snapshot = await db.collection("vagas").orderBy("dataCriacao", "desc").limit(6).get();
        let html = '';
        snapshot.forEach(doc => {
            if(doc.id !== vagaId) {
                const v = doc.data();
                html += `
                    <div class="card-mini">
                        <img src="${v.imagem || 'https://via.placeholder.com/150'}">
                        <h4>${v.titulo}</h4>
                        <a href="vaga.html?id=${doc.id}" class="btn-ver">Ver</a>
                    </div>
                `;
            }
        });
        document.getElementById('listaSugestoes').innerHTML = html;
    }

    function partilhar() {
        if (navigator.share) {
            navigator.share({ title: document.title, url: window.location.href });
        } else {
            navigator.clipboard.writeText(window.location.href);
            alert('Link copiado!');
        }
    }
    carregar();
</script>

</body>
</html>
