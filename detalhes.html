<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>Detalhes da Vaga</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .card { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        .img-banner { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; margin-bottom: 20px; }
        .btn-cand { width: 100%; padding: 15px; background: #d93025; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div class="card" id="view">Carregando...</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    const db = getFirestore(initializeApp({ apiKey: "AIzaSyAMI9bD8EhVVS8Xp9rlvhPWg4hS3PBUH2A", projectId: "empregosportal", storageBucket: "empregosportal.firebasestorage.app", appId: "1:898227669228:web:9c12c501bd2e9c73e1bdc9" }));
    const id = new URLSearchParams(window.location.search).get('id');

    async function load() {
        const snap = await getDoc(doc(db, "vagas", id));
        if (snap.exists()) {
            const v = snap.data();
            document.getElementById('view').innerHTML = `
                <img src="${v.foto}" class="img-banner">
                <h1>${v.titulo}</h1>
                <p><b>Empresa:</b> ${v.empresa}</p>
                <p>${v.desc}</p>
                <button class="btn-cand" onclick="location.href='mailto:${v.email}'">Candidatar-se Agora</button>
            `;
        }
    }
    load();
</script>
</body>
</html>
