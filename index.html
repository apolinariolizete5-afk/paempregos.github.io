<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PA VAGAS MZ | Empregos e Oportunidades</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        :root { --primary: #0b5ed7; --bg: #f4f7f6; --text: #333; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 50px; min-height: 100vh; position: relative; }
        
        /* Menu Lateral */
        .side-menu { height: 100%; width: 0; position: fixed; z-index: 9999; top: 0; left: 0; background-color: #fff; overflow-x: hidden; transition: 0.5s; padding-top: 0; box-shadow: 2px 0 5px rgba(0,0,0,0.2); }
        .side-menu a { padding: 15px 25px; text-decoration: none; font-size: 16px; color: var(--text); display: block; display: flex; align-items: center; gap: 10px; }
        .side-menu a:hover { color: var(--primary); background: #f0f0f0; }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 30px; cursor: pointer; color: white; }

        /* Estilo Geral */
        header { background: var(--primary); color: white; padding: 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
        .hero { background: linear-gradient(135deg, #0b5ed7, #4e9cff); color: white; padding: 40px 20px; text-align: center; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        .search-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: -50px; display: grid; gap: 10px; grid-template-columns: 1fr 1fr auto; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; }
        #btnPesquisar { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .vaga-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-ver { display: block; background: var(--primary); color: white; text-align: center; padding: 10px; border-radius: 8px; margin-top: 15px; text-decoration: none; }
        
        /* Rodapé */
        footer { background: #fff; padding: 40px 20px; text-align: center; border-top: 1px solid #eee; margin-top: 50px; width: 100%; }
        footer .links a { margin: 0 10px; color: #555; text-decoration: none; font-size: 0.9rem; display: inline-block; padding: 5px; }
        footer .social a { font-size: 1.5rem; margin: 0 15px; color: #333; }
        .assinatura { font-size: 0.75rem; color: #888; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }

        /* Botão Flutuante */
        .float-wa { position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white; padding: 15px 18px; border-radius: 50px; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 9998; text-decoration: none; }

        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-load-more { background: #6c757d; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; display: block; margin: 20px auto; }
        
        @media (max-width: 600px) { .search-box { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="sideMenu" class="side-menu">
    <div style="padding: 30px 20px; text-align: center; background: #0b5ed7; color: white; margin-bottom: 10px;">
        <span class="close-btn" onclick="toggleMenu(false)">&times;</span>
        <h3>PA VAGAS MZ</h3>
    </div>
    <a href="index.html"><i class="fas fa-home"></i> Página Inicial</a>
    <a href="enviar-vaga.html"><i class="fas fa-paper-plane"></i> Enviar Vaga</a>
    <a href="contacto.html"><i class="fas fa-phone"></i> Contacto</a>
    <a href="politica.html"><i class="fas fa-user-shield"></i> Política de Privacidade</a>
    <a href="dmca.html"><i class="fas fa-copyright"></i> DMCA</a>
</div>

<header>
    <div onclick="toggleMenu(true)" style="cursor:pointer; color: white;"><i class="fas fa-bars fa-2x"></i></div>
    <h2 style="font-size: 1.2rem;">PA VAGAS MZ</h2>
    <div></div>
</header>

<div class="hero">
    <h1>Encontre o seu emprego ideal</h1>
</div>

<div class="container">
    <div class="search-box">
        <input type="text" id="pesquisa" placeholder="Cargo ou Empresa...">
        <select id="provincia">
            <option value="">Todas Províncias</option>
            <option>Maputo</option><option>Gaza</option><option>Inhambane</option>
            <option>Sofala</option><option>Manica</option><option>Tete</option>
            <option>Zambézia</option><option>Nampula</option><option>Niassa</option>
            <option>Cabo Delgado</option>
        </select>
        <button id="btnPesquisar">Pesquisar</button>
    </div>

    <div id="status" class="loader"></div>
    <div class="vaga-grid" id="listaVagas"></div>
    <button id="btnMais" class="btn-load-more" style="display:none;" onclick="carregarVagas()">Carregar Mais Vagas</button>
</div>

<!-- Rodapé -->
<footer>
    <div class="links">
        <a href="index.html">Página Inicial</a> | <a href="contacto.html">Contacto</a> | <a href="politica.html">Política de Privacidade</a> | <a href="dmca.html">DMCA</a>
    </div>
    <div class="social" style="margin: 20px 0;">
        <a href="https://www.facebook.com/profile.php?id=61591198577276"><i class="fab fa-facebook"></i></a>
        <a href="https://whatsapp.com/channel/0029VbDLGxu4SpkOM6UG7S3p"><i class="fab fa-whatsapp"></i></a>
    </div>
    <div class="assinatura">Criado e desenvolvido por Apolinário Lizete</div>
</footer>

<!-- Botão Flutuante -->
<a href="https://whatsapp.com/channel/0029VbDLGxu4SpkOM6UG7S3p" class="float-wa" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

<!-- Scripts -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAMI9bD8EhVVS8Xp9rlvhPWg4hS3PBUH2A", projectId: "empregosportal", storageBucket: "empregosportal.firebasestorage.app", appId: "1:898227669228:web:9c12c501bd2e9c73e1bdc9" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let lastVisible = null;
    function toggleMenu(open) { document.getElementById("sideMenu").style.width = open ? "280px" : "0"; }

    async function carregarVagas() {
        document.getElementById('status').style.display = 'block';
        let query = db.collection("vagas").orderBy("dataCriacao", "desc").limit(10);
        if (lastVisible) query = query.startAfter(lastVisible);
        
        try {
            const snap = await query.get();
            document.getElementById('status').style.display = 'none';
            if (snap.empty) { document.getElementById('btnMais').style.display = 'none'; return; }
            lastVisible = snap.docs[snap.docs.length - 1];
            snap.forEach(doc => {
                const v = doc.data();
                document.getElementById('listaVagas').innerHTML += `
                    <div class="card">
                        <h3>${v.titulo}</h3>
                        <p><strong>${v.empresa}</strong></p>
                        <p><i class="fas fa-map-marker-alt"></i> ${v.provincia}</p>
                        <a href="vaga.html?id=${doc.id}" class="btn-ver">Ver Vaga</a>
                    </div>
                `;
            });
            document.getElementById('btnMais').style.display = 'block';
        } catch(e) { document.getElementById('status').innerHTML = "Erro ao carregar."; }
    }
    carregarVagas();
</script>
</body>
</html>
