<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO & OPEN GRAPH (Otimizado para WhatsApp/Facebook) -->
    <title>PA VAGAS MZ | Empregos e Oportunidades em Moçambique</title>
    <meta name="description" content="O maior portal de empregos de Moçambique. Encontre vagas de emprego, estágios e oportunidades diariamente.">
    <meta property="og:title" content="PA VAGAS MZ | Empregos em Moçambique">
    <meta property="og:description" content="Encontre a sua próxima oportunidade de carreira em Moçambique.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://i.imgur.com/your-logo-here.png"> <!-- Substitua por um link de imagem do seu logo -->
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        :root { --primary: #0b5ed7; --bg: #f4f7f6; --text: #333; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 50px; }
        
        /* Spinner de Carregamento */
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        header { background: var(--primary); color: white; padding: 20px; display: flex; align-items: center; justify-content: space-between; }
        .hero { background: linear-gradient(135deg, #0b5ed7, #4e9cff); color: white; padding: 40px 20px; text-align: center; }
        
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        
        /* Search Box */
        .search-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: -50px; display: grid; gap: 10px; grid-template-columns: 1fr 1fr auto; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; }
        button#btnPesquisar { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; }

        .vaga-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .btn-ver { display: block; background: var(--primary); color: white; text-align: center; padding: 10px; border-radius: 8px; margin-top: 15px; text-decoration: none; }
        
        /* Cookies */
        #cookie-bar { position: fixed; bottom: 0; width: 100%; background: #222; color: white; padding: 15px; text-align: center; z-index: 1000; display: none; }
    </style>
</head>
<body>

<header>
    <h2>PA VAGAS MZ</h2>
    <div onclick="alert('Menu clicado')"><i class="fas fa-bars"></i></div>
</header>

<div class="hero">
    <h1>Encontre o seu emprego ideal</h1>
    <p>Milhares de vagas em Moçambique</p>
</div>

<div class="container">
    <div class="search-box">
        <input type="text" id="pesquisa" placeholder="Cargo ou Empresa...">
        <select id="provincia">
            <option value="">Todas Províncias</option>
            <option>Maputo</option><option>Gaza</option><option>Inhambane</option>
            <option>Sofala</option><option>Manica</option><option>Tete</option>
            <option>Zambézia</option><option>Nampula</option><option>Niassa</option>
            <option>Cabo Delgado</option>
        </select>
        <button id="btnPesquisar">Pesquisar</button>
    </div>

    <div id="status" class="loader"></div>
    <div class="vaga-grid" id="listaVagas"></div>
</div>

<!-- Cookies -->
<div id="cookie-bar">Aceite os cookies para navegar. <button onclick="aceitarCookies()">OK</button></div>

<!-- Firebase e Lógica -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAMI9bD8EhVVS8Xp9rlvhPWg4hS3PBUH2A",
        projectId: "empregosportal",
        storageBucket: "empregosportal.firebasestorage.app",
        messagingSenderId: "898227669228",
        appId: "1:898227669228:web:9c12c501bd2e9c73e1bdc9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let todasVagas = [];

    async function carregarVagas() {
        const lista = document.getElementById('listaVagas');
        const status = document.getElementById('status');
        try {
            const snap = await db.collection("vagas").orderBy("dataCriacao", "desc").get();
            todasVagas = [];
            snap.forEach(doc => todasVagas.push({ id: doc.id, ...doc.data() }));
            status.style.display = 'none';
            renderizar(todasVagas);
        } catch (e) {
            status.innerHTML = "Erro ao carregar dados.";
        }
    }

    function renderizar(lista) {
        const div = document.getElementById('listaVagas');
        div.innerHTML = lista.length > 0 ? "" : "<p>Nenhuma vaga encontrada.</p>";
        lista.forEach(v => {
            div.innerHTML += `
                <div class="card">
                    <h3>${v.titulo}</h3>
                    <p><strong>${v.empresa}</strong></p>
                    <p><i class="fas fa-map-marker-alt"></i> ${v.provincia}</p>
                    <a href="vaga.html?id=${v.id}" class="btn-ver">Ver Vaga</a>
                </div>
            `;
        });
    }

    document.getElementById('btnPesquisar').onclick = () => {
        const termo = document.getElementById('pesquisa').value.toLowerCase();
        const prov = document.getElementById('provincia').value;
        const filtradas = todasVagas.filter(v => 
            (v.titulo.toLowerCase().includes(termo) || v.empresa.toLowerCase().includes(termo)) &&
            (prov === "" || v.provincia === prov)
        );
        renderizar(filtradas);
    };

    // Cookies
    function aceitarCookies() { document.getElementById('cookie-bar').style.display = 'none'; localStorage.setItem('cookie', 'aceite'); }
    if(!localStorage.getItem('cookie')) document.getElementById('cookie-bar').style.display = 'block';

    carregarVagas();
</script>

</body>
</html>
