<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PA VAGAS MZ | Destaques</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding-bottom: 80px; }
        header { background: #1a1a2e; color: white; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .menu-btn { position: absolute; left: 20px; cursor: pointer; font-size: 24px; }
        
        .sidebar { height: 100%; width: 250px; position: fixed; top: 0; left: -250px; background: #1a1a2e; z-index: 2000; transition: 0.3s; padding-top: 60px; }
        .sidebar.open { left: 0; }
        .sidebar a { display: block; padding: 15px 20px; color: white; text-decoration: none; border-bottom: 1px solid #2d3748; }
        
        .search-box { padding: 15px; background: white; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; }
        
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .vaga-card { background: white; border-radius: 10px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .vaga-card img { width: 100%; height: 180px; object-fit: cover; }
        .vaga-content { padding: 15px; }
        .btn-ver { width: 100%; padding: 12px; background: #d93025; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #1a1a2e; z-index: 900; }
        .bottom-nav button { flex: 1; padding: 15px; border: none; background: transparent; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</div>
    <h1>PA VAGAS MZ</h1>
</header>

<div class="sidebar">
    <a onclick="document.querySelector('.sidebar').classList.remove('open')">Fechar ✕</a>
    <a href="index.html">PÁGINA INICIAL</a>
    <a href="mailto:apolinariolizete5@email.com">ENVIE SUA VAGA</a>
    <a onclick="alert('POLÍTICA DE PRIVACIDADE: Dados protegidos.')">POLÍTICA DE PRIVACIDADE</a>
    <a onclick="alert('SOBRE NÓS: Conectamos talentos em Moçambique.')">SOBRE NÓS</a>
</div>

<div class="search-box">
    <input type="text" id="search" placeholder="Pesquisar..." oninput="filtrar()">
    <select id="prov" onchange="filtrar()">
        <option value="">Todas as Províncias</option>
        <option value="Maputo">Maputo</option><option value="Sofala">Sofala</option>
    </select>
</div>

<div class="container" id="lista">A carregar vagas...</div>

<div class="bottom-nav">
    <button onclick="location.href='index.html'">PAGINA INICIAL</button>
    <button onclick="location.href='mailto:apolinariolizete5@email.com'">ENVIE SUA VAGAS</button>
    <button onclick="alert('Contacta nos Atraves de :
    wa.me\+258879630469 
    email: apolinariolizete5@gmail.com')">CONTACTO</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    const db = getFirestore(initializeApp({ apiKey: "AIzaSyAMI9bD8EhVVS8Xp9rlvhPWg4hS3PBUH2A", projectId: "empregosportal", storageBucket: "empregosportal.firebasestorage.app", appId: "1:898227669228:web:9c12c501bd2e9c73e1bdc9" }));
    let todas = [];

    async function load() {
        const q = query(collection(db, "vagas"), orderBy("dataCriacao", "desc"));
        const snap = await getDocs(q);
        todas = [];
        snap.forEach(d => todas.push({id: d.id, ...d.data()}));
        render(todas);
    }
    window.filtrar = () => {
        const t = document.getElementById('search').value.toLowerCase();
        const p = document.getElementById('prov').value;
        render(todas.filter(v => v.titulo.toLowerCase().includes(t) && (p === "" || v.provincia === p)));
    };
    function render(data) {
        document.getElementById('lista').innerHTML = data.map(v => `
            <div class="vaga-card">
                <img src="${v.foto}" onerror="this.src='https://via.placeholder.com/600x180'">
                <div class="vaga-content">
                    <h3>${v.titulo}</h3>
                    <p>🏢 ${v.empresa} | 📍 ${v.provincia}</p>
                    <button class="btn-ver" onclick="location.href='detalhes.html?id=${v.id}'" style="margin-top:10px">Ver Detalhes</button>
                </div>
            </div>`).join('');
    }
    load();
</script>
</body>
</html>
