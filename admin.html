<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>Painel de Administração</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .form-group { margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; }
        button { padding: 10px 20px; background: #1a1a2e; color: white; border: none; cursor: pointer; }
        .vaga-item { background: white; padding: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 5px; }
    </style>
</head>
<body>

<h2>Painel de Admin</h2>

<div id="login-area">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="fazerLogin()">Entrar</button>
</div>

<div id="painel" style="display:none;">
    <h3>Publicar Nova Vaga</h3>
    <div class="form-group"><input type="text" id="titulo" placeholder="Título da Vaga"></div>
    <div class="form-group"><input type="text" id="empresa" placeholder="Empresa"></div>
    <div class="form-group">
        <select id="tipo">
            <option value="Full-time">Full-time</option>
            <option value="Part-time">Part-time</option>
            <option value="Estágio">Estágio</option>
            <option value="Freelance">Freelance</option>
        </select>
    </div>
    <div class="form-group">
        <select id="provincia">
            <option value="Maputo">Maputo</option><option value="Sofala">Sofala</option>
            <option value="Gaza">Gaza</option><option value="Inhambane">Inhambane</option>
            <option value="Manica">Manica</option><option value="Tete">Tete</option>
            <option value="Zambezia">Zambezia</option><option value="Nampula">Nampula</option>
            <option value="Niassa">Niassa</option><option value="Cabo Delgado">Cabo Delgado</option>
        </select>
    </div>
    <div class="form-group"><input type="number" id="ano" placeholder="Ano (ex: 2026)"></div>
    <div class="form-group"><input type="text" id="foto" placeholder="Link da imagem"></div>
    <div class="form-group"><textarea id="desc" placeholder="Descrição"></textarea></div>
    <button onclick="publicarVaga()">Publicar Vaga</button>

    <hr style="margin: 30px 0;">
    <h3>Gerir Vagas Existentes</h3>
    <div id="lista-admin">A carregar vagas...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const config = { apiKey: "AIzaSyAMI9bD8EhVVS8Xp9rlvhPWg4hS3PBUH2A", projectId: "empregosportal", storageBucket: "empregosportal.firebasestorage.app", appId: "1:898227669228:web:9c12c501bd2e9c73e1bdc9" };
    const db = getFirestore(initializeApp(config));
    const auth = getAuth();

    window.fazerLogin = () => {
        signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('senha').value)
        .then(() => { 
            document.getElementById('login-area').style.display = 'none'; 
            document.getElementById('painel').style.display = 'block'; 
            carregarVagasAdmin();
        })
        .catch(e => alert("Erro: " + e.message));
    };

    window.publicarVaga = async () => {
        await addDoc(collection(db, "vagas"), {
            titulo: document.getElementById('titulo').value,
            empresa: document.getElementById('empresa').value,
            tipo: document.getElementById('tipo').value,
            provincia: document.getElementById('provincia').value,
            ano: document.getElementById('ano').value,
            foto: document.getElementById('foto').value,
            desc: document.getElementById('desc').value,
            dataCriacao: serverTimestamp()
        });
        alert("Publicado!");
        carregarVagasAdmin();
    };

    async function carregarVagasAdmin() {
        const q = query(collection(db, "vagas"), orderBy("dataCriacao", "desc"));
        const snap = await getDocs(q);
        const lista = document.getElementById('lista-admin');
        lista.innerHTML = "";
        snap.forEach(d => {
            lista.innerHTML += `<div class="vaga-item"><span>${d.data().titulo} (${d.data().tipo})</span> <button onclick="eliminarVaga('${d.id}')" style="background:red">Eliminar</button></div>`;
        });
    }

    window.eliminarVaga = async (id) => {
        if(confirm("Tem certeza que deseja eliminar esta vaga?")) {
            await deleteDoc(doc(db, "vagas", id));
            carregarVagasAdmin();
        }
    };
</script>
</body>
</html>
