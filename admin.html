<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Administração | PA VAGAS MZ</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .admin-container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #0b5ed7; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-limpar { background: #dc3545; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; display: none; margin-top: 5px; }
        .divider { text-align: center; margin: 15px 0; color: #666; font-weight: bold; }
        .vaga-item { background: #f8f9fa; padding: 15px; margin-top: 12px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; border-left: 4px solid #0b5ed7; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/compressorjs/1.2.1/compressor.min.js"></script>
</head>
<body>

<div class="admin-container">
    <h2>Painel de Administração</h2>

    <div id="login-area">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="fazerLogin()">Entrar</button>
    </div>

    <div id="painel" style="display:none;">
        <h3>Publicar Nova Vaga</h3>
        
        <div class="form-group">
            <label>Título da Vaga *</label>
            <input type="text" id="titulo" placeholder="Ex: Programador Web">
        </div>
        
        <div class="form-group">
            <label>Empresa *</label>
            <input type="text" id="empresa" placeholder="Ex: Tech MZ">
        </div>

        <div class="form-group">
            <label>Imagem da Vaga *</label>
            <input type="file" id="fotoFicheiro" accept="image/*" onchange="verificarFicheiro(this)">
            <button type="button" id="btnLimparFoto" class="btn-limpar" onclick="limparFicheiro()">Remover imagem selecionada</button>
            
            <div class="divider">OU</div>

            <input type="text" id="fotoLink" placeholder="Cole o link da imagem aqui" oninput="verificarLink(this)">
        </div>

        <select id="provincia">
            <option value="Maputo Cidade">Maputo Cidade</option>
            <option value="Maputo Província">Maputo Província</option>
        </select>
        <input type="text" id="localidade" placeholder="Localidade">
        <textarea id="desc" rows="3" placeholder="Descrição"></textarea>
        
        <button onclick="publicarVaga()">Publicar Vaga</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const config = { apiKey: "AIzaSyAMI9bD8EhVVS8Xp9rlvhPWg4hS3PBUH2A", projectId: "empregosportal", storageBucket: "empregosportal.firebasestorage.app", appId: "1:898227669228:web:9c12c501bd2e9c73e1bdc9" };
    const app = initializeApp(config);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // --- LÓGICA DE IMAGEM ---
    window.verificarFicheiro = (input) => {
        const file = input.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) {
            alert("Formato não suportado! Escolha uma imagem.");
            limparFicheiro();
            return;
        }
        document.getElementById('fotoLink').disabled = true;
        document.getElementById('btnLimparFoto').style.display = 'block';
    };

    window.limparFicheiro = () => {
        document.getElementById('fotoFicheiro').value = "";
        document.getElementById('fotoLink').disabled = false;
        document.getElementById('btnLimparFoto').style.display = 'none';
    };

    window.verificarLink = (input) => {
        const fileInput = document.getElementById('fotoFicheiro');
        if (input.value.length > 0) {
            fileInput.disabled = true;
        } else {
            fileInput.disabled = false;
        }
    };

    const processarImagem = (file) => new Promise((resolve) => {
        new Compressor(file, {
            quality: 0.3, maxWidth: 300, mimeType: 'image/jpeg',
            success(result) {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(result);
            },
            error() { resolve(null); }
        });
    });

    // --- PUBLICAÇÃO ---
    window.publicarVaga = async () => {
        const titulo = document.getElementById('titulo').value;
        const empresa = document.getElementById('empresa').value;
        const fileInput = document.getElementById('fotoFicheiro');
        const linkInput = document.getElementById('fotoLink');

        if (!titulo || !empresa) { alert("Título e Empresa são obrigatórios!"); return; }

        let imagemFinal = null;

        // Tenta processar ficheiro
        if (fileInput.files.length > 0) {
            imagemFinal = await processarImagem(fileInput.files[0]);
            if (!imagemFinal) {
                alert("Erro ao processar imagem. Tente usar um link ou outra imagem.");
                return;
            }
        } 
        // Se não, tenta usar link
        else if (linkInput.value.length > 0) {
            imagemFinal = linkInput.value;
        } else {
            alert("É obrigatório selecionar uma imagem ou inserir um link!");
            return;
        }

        // Salvar no Firebase
        try {
            const id = titulo.toLowerCase().replace(/\s+/g, '-') + '-' + Date.now();
            await setDoc(doc(db, "vagas", id), {
                titulo, empresa, imagem: imagemFinal, dataCriacao: serverTimestamp()
            });
            alert("Vaga publicada!");
        } catch (e) {
            alert("Erro ao publicar: " + e.message);
        }
    };

    window.fazerLogin = () => {
        signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('senha').value)
        .then(() => { document.getElementById('login-area').style.display = 'none'; document.getElementById('painel').style.display = 'block'; });
    };
</script>
</body>
</html>
