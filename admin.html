<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PA VAGAS MZ | Detalhes da Vaga</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .vaga-container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        img { width: 100%; border-radius: 10px; margin-bottom: 20px; }
        h1 { margin: 0; color: #0b5ed7; font-size: 22px; }
        .empresa { color: #555; font-weight: bold; margin-bottom: 15px; display: block; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .info-box { background: #f8f9fa; padding: 10px; border-radius: 8px; font-size: 13px; }
        .descricao { line-height: 1.6; color: #444; margin-bottom: 20px; }
        .btn-candidatar { width: 100%; padding: 15px; background: #0b5ed7; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div class="vaga-container" id="conteudo">
    <div id="loading">Carregando vaga...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Configuração idêntica à do Admin
    const config = { apiKey: "AIzaSyAMI9bD8EhVVS8Xp9rlvhPWg4hS3PBUH2A", projectId: "empregosportal", storageBucket: "empregosportal.firebasestorage.app", appId: "1:898227669228:web:9c12c501bd2e9c73e1bdc9" };
    const app = initializeApp(config);
    const db = getFirestore(app);

    // Pegar o ID da vaga da URL (ex: vaga.html?id=Assistente-de-Marketing-12345)
    const urlParams = new URLSearchParams(window.location.search);
    const vagaId = urlParams.get('id');

    async function carregarVaga() {
        if (!vagaId) { document.getElementById('conteudo').innerHTML = "Vaga não encontrada."; return; }

        const docRef = doc(db, "vagas", vagaId);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            const data = docSnap.data();
            
            // Incrementa visualização em tempo real
            await updateDoc(docRef, { views: increment(1) });

            document.getElementById('conteudo').innerHTML = `
                <img src="${data.imagem}" alt="Imagem Vaga">
                <h1>${data.titulo}</h1>
                <span class="empresa">${data.empresa}</span>
                <div class="info-grid">
                    <div class="info-box"><strong>Local:</strong><br>${data.provincia}</div>
                    <div class="info-box"><strong>Salário:</strong><br>${data.salario}</div>
                </div>
                <p><strong>Prazo:</strong> ${data.prazo}</p>
                <div class="descricao">${data.descricao.replace(/\n/g, '<br>')}</div>
                <button class="btn-candidatar" onclick="enviarCandidatura('${data.email}', '${data.titulo}')">Enviar Candidatura</button>
            `;
        } else {
            document.getElementById('conteudo').innerHTML = "Vaga expirada ou removida.";
        }
    }

    // Função que abre o email do usuário
    window.enviarCandidatura = (emailEmpresa, tituloVaga) => {
        const assunto = `Candidatura para a vaga: ${tituloVaga}`;
        const corpo = `Olá, estou interessado na vaga de ${tituloVaga}. Segue em anexo o meu CV.`;
        window.location.href = `mailto:${emailEmpresa}?subject=${encodeURIComponent(assunto)}&body=${encodeURIComponent(corpo)}`;
    };

    carregarVaga();
</script>
</body>
</html>
