<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | PA VAGAS MZ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        :root { --primary: #0b5ed7; --danger: #dc3545; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #333; padding: 20px; }
        .admin-container { max-width: 900px; margin: 0 auto; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border-bottom: 4px solid var(--primary); }
        .stat-card h3 { color: #666; font-size: 11px; margin: 0; text-transform: uppercase; }
        .stat-card p { font-size: 24px; font-weight: 700; color: var(--primary); margin: 5px 0 0 0; }

        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h2 { color: var(--primary); margin-top: 0; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; font-size: 14px; }
        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .vaga-item { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary); }
        .btn-del { background: var(--danger); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/compressorjs/1.2.1/compressor.min.js"></script>
</head>
<body>

<div class="admin-container">
    <div id="login-area" class="card">
        <h2>Acesso Administrativo</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="senha" placeholder="Senha">
        <button class="btn-main" onclick="fazerLogin()">Entrar</button>
    </div>

    <div id="painel" style="display:none;">
        <div class="stats-grid">
            <div class="stat-card"><h3>Vagas</h3><p id="totalVagas">0</p></div>
            <div class="stat-card"><h3>Hoje</h3><p id="viewsHoje">0</p></div>
            <div class="stat-card"><h3>Semana</h3><p id="viewsSemana">0</p></div>
            <div class="stat-card"><h3>Total</h3><p id="totalViews">0</p></div>
        </div>

        <div class="card">
            <h3>Publicar Nova Vaga</h3>
            <div class="form-row">
                <input type="text" id="titulo" placeholder="Título da Vaga *">
                <input type="text" id="empresa" placeholder="Empresa *">
            </div>
            <div class="form-row">
                <select id="provincia">
                    <option value="">Selecione a Província</option>
                    <option value="Maputo Cidade">Maputo Cidade</option>
                    <option value="Maputo Província">Maputo Província</option>
                    <option value="Gaza">Gaza</option>
                    <option value="Inhambane">Inhambane</option>
                    <option value="Sofala">Sofala</option>
                    <option value="Manica">Manica</option>
                    <option value="Tete">Tete</option>
                    <option value="Zambézia">Zambézia</option>
                    <option value="Nampula">Nampula</option>
                    <option value="Niassa">Niassa</option>
                    <option value="Cabo Delgado">Cabo Delgado</option>
                </select>
                <input type="text" id="localidade" placeholder="Localidade">
            </div>
            <div class="form-row">
                <input type="text" id="salario" placeholder="Salário">
                <input type="date" id="prazo" placeholder="Prazo">
            </div>
            <input type="email" id="emailVaga" placeholder="Email para envio de CV">
            <textarea id="desc" rows="3" placeholder="Descrição detalhada da vaga *"></textarea>
            
            <label>Imagem da Vaga (Obrigatório) *</label>
            <input type="file" id="fotoFicheiro" accept="image/*" onchange="verificarFicheiro(this)">
            <input type="text" id="fotoLink" placeholder="Ou cole o Link da imagem" oninput="verificarLink(this)">
            
            <button class="btn-main" id="btnPublicar" onclick="publicarVaga()">Publicar Vaga</button>
        </div>

        <h3>Gestão de Vagas</h3>
        <div id="lista-admin">A carregar...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, setDoc, doc, deleteDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const config = { apiKey: "AIzaSyAMI9bD8EhVVS8Xp9rlvhPWg4hS3PBUH2A", projectId: "empregosportal", storageBucket: "empregosportal.firebasestorage.app", appId: "1:898227669228:web:9c12c501bd2e9c73e1bdc9" };
    const app = initializeApp(config);
    const db = getFirestore(app);
    const auth = getAuth(app);

    window.verificarFicheiro = (input) => { document.getElementById('fotoLink').disabled = (input.files.length > 0); };
    window.verificarLink = (input) => { document.getElementById('fotoFicheiro').disabled = (input.value.length > 0); };

    const processarImagem = (file) => new Promise((resolve) => {
        new Compressor(file, { quality: 0.3, maxWidth: 300, success(r) { 
            const reader = new FileReader(); reader.onloadend = () => resolve(reader.result); reader.readAsDataURL(r); 
        }, error() { resolve(null); } });
    });

    window.fazerLogin = () => {
        signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('senha').value)
        .then(() => { document.getElementById('login-area').style.display = 'none'; document.getElementById('painel').style.display = 'block'; iniciarMonitoramento(); })
        .catch(e => alert("Erro: " + e.message));
    };

    window.publicarVaga = async () => {
        // Validação dos 4 campos obrigatórios
        const titulo = document.getElementById('titulo').value;
        const empresa = document.getElementById('empresa').value;
        const desc = document.getElementById('desc').value;
        const fileInput = document.getElementById('fotoFicheiro');
        const linkInput = document.getElementById('fotoLink');

        if(!titulo || !empresa || !desc) { alert("Título, Empresa e Descrição são obrigatórios!"); return; }
        if(fileInput.files.length === 0 && !linkInput.value) { alert("Imagem é obrigatória!"); return; }

        const btn = document.getElementById('btnPublicar');
        btn.disabled = true; btn.innerText = "A Publicar...";

        let img = linkInput.value || "https://cdn-icons-png.flaticon.com/512/2986/2986323.png";
        if (fileInput.files.length > 0) {
            img = await processarImagem(fileInput.files[0]);
            if(!img) { alert("Erro na imagem."); btn.disabled = false; btn.innerText = "Publicar Vaga"; return; }
        }

        try {
            await setDoc(doc(db, "vagas", titulo.toLowerCase().replace(/\s+/g, '-') + '-' + Date.now()), {
                titulo: titulo,
                empresa: empresa,
                provincia: document.getElementById('provincia').value || "Não especificada",
                localidade: document.getElementById('localidade').value || "Não especificada",
                salario: document.getElementById('salario').value || "Não especificado",
                prazo: document.getElementById('prazo').value || "Indeterminado",
                email: document.getElementById('emailVaga').value || "Sem email",
                descricao: desc,
                imagem: img,
                views: 0,
                dataCriacao: serverTimestamp()
            });
            alert("Publicado com sucesso!");
            // Limpa apenas campos de texto principais
            document.getElementById('titulo').value = "";
            document.getElementById('empresa').value = "";
            document.getElementById('desc').value = "";
            btn.disabled = false; btn.innerText = "Publicar Vaga";
        } catch (e) { alert("Erro: " + e.message); btn.disabled = false; btn.innerText = "Publicar Vaga"; }
    ;
        function iniciarMonitoramento() {
    onSnapshot(query(collection(db, "vagas"), orderBy("dataCriacao", "desc")), (snap) => {
        const lista = document.getElementById('lista-admin');
        lista.innerHTML = "";
        let tV = 0, tVw = 0, vH = 0, vS = 0;
        
        const hoje = new Date();
        const hojeStr = hoje.toLocaleDateString('sv-SE'); // Data de hoje

        // Criar uma lista com os últimos 7 dias para somar a semana
        const ultimos7Dias = [];
        for (let i = 0; i < 7; i++) {
            const d = new Date();
            d.setDate(hoje.getDate() - i);
            ultimos7Dias.push(d.toLocaleDateString('sv-SE'));
        }

        snap.forEach(d => {
            const v = d.data();
            const views = v.views || 0;
            const dailyViews = v.dailyViews || {}; // Pega o mapa de visualizações diárias
            const data = v.dataCriacao ? v.dataCriacao.toDate() : new Date();
            
            tV++; 
            tVw += views; // Total Geral

            // 1. Calcular Visualizações de Hoje
            if (dailyViews[hojeStr]) {
                vH += dailyViews[hojeStr];
            }

            // 2. Calcular Visualizações da Semana (últimos 7 dias)
            ultimos7Dias.forEach(diaStr => {
                if (dailyViews[diaStr]) {
                    vS += dailyViews[diaStr];
                }
            });

            lista.innerHTML += `<div class="vaga-item">
                <div><strong>${v.titulo}</strong><span>${views} views | ${data.toLocaleDateString()}</span></div>
                <button class="btn-del" onclick="eliminar('${d.id}')">Eliminar</button>
            </div>`;
        });

        // Atualizar os cards do topo do painel
        document.getElementById('totalVagas').innerText = tV;
        document.getElementById('totalViews').innerText = tVw;
        document.getElementById('viewsHoje').innerText = vH;
        document.getElementById('viewsSemana').innerText = vS;
    });
}


    window.eliminar = async (id) => { if(confirm("Eliminar?")) await deleteDoc(doc(db, "vagas", id)); };
</script>
</body>
</html>
